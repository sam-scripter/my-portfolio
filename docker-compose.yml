services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - nextjs
      - api
    restart: unless-stopped
    networks:
      - portfolio_net

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=https://shadivahlabs.com
    restart: unless-stopped
    networks:
      - portfolio_net

  api:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    env_file:
      - ./backend-node/.env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - portfolio_net

  rag:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    env_file:
      - ./backend-python/.env.production
    volumes:
      # Mount knowledge/ folder so ingest endpoint can read .md files
      - ./knowledge:/app/../knowledge:ro
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - portfolio_net

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=samuel_portfolio
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - portfolio_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - portfolio_net

volumes:
  pgdata:
  redisdata:
  certbot_certs:
  certbot_www:

networks:
  portfolio_net:
    driver: bridge