events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css
               application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────
    server {
        listen 80;
        server_name shadivahlabs.com www.shadivahlabs.com;

        # Certbot challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name shadivahlabs.com www.shadivahlabs.com;

        # SSL certificates (from Certbot)
        ssl_certificate     /etc/letsencrypt/live/shadivahlabs.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shadivahlabs.com/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Static asset caching (Next.js)
        location /_next/static/ {
            proxy_pass http://nextjs:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API routes → Fastify ─────────────────────────────────────
        location /api/ {
            proxy_pass http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Critical for SSE streaming — disable all buffering
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            chunked_transfer_encoding on;
        }

        # ── Everything else → Next.js ─────────────────────────────────
        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }
}