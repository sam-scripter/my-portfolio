name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 92.4.129.50 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@92.4.129.50 \
            "cd ~/my-portfolio && \
             git pull origin main && \
             sudo docker compose -f docker-compose.portfolio.yml --env-file .env up -d --build && \
             sudo docker exec ksg_nginx nginx -s reload && \
             echo 'Deploy complete'"

      - name: Health check
        run: |
          sleep 30
          curl -f https://shadivahlabs.com || exit 1
          echo "Site is live"